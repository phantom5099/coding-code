server:
  port: 8080
maxSteps: 50
context:
  defaultMaxTokens: 200000
  reservedTokens: 20000
  thresholds:
    budgetReduction: 0.6
    prune: 0.7
    slidingWindow: 0.75
    collapse: 0.8
    compaction: 0.9
  budgetReductionMaxTokensPerTool: 2000
  budgetReductionKeepLines: 20
  pruneProtectedTokens: 40000
  pruneMinRelease: 20000
  slidingWindowCandidates:
    - 10
    - 6
    - 4
    - 2
  collapseMinTokens: 500
  collapseSummaryMaxTokens: 1500
  toolsExemptFromPrune:
    - Read
    - todo_write
    - todo_read
    - tool_search
  toolsExemptFromTruncation:
    - Read
    - todo_write
    - todo_read
    - tool_search
  prefixTurnsProtected: 1
  minTurnsBetweenCompactions: 5
  keepRecentTurns: 10
  compactionModel: haiku
  archiveTtlDays: 30
  checkpointKeep: 50
memory:
  enabled: false
  model: ""
  projectFile: .codingcode/memory.md
  userFile: ~/.codingcode/memory.md
  maxBytes: 16384
  promptMaxBytes: 8192
activeModel:
  model: kimi-k2.5
  apiKeyEnv: KIMI_API_KEY
